<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE | Daily Briefing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">

        <!-- Loading State -->
        <div id="loading" class="loading-state">
            <div class="spinner"></div>
            <p>Loading latest briefing...</p>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state hidden">
            <h1 class="logo">SAGE</h1>
            <p>No briefing generated yet.</p>
            <button class="run-btn primary" onclick="runPipeline()">
                <span class="btn-text">Generate Briefing</span>
            </button>
            <div id="empty-status" class="meta-status"></div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard hidden">
            <header class="header">
                <div>
                    <h1 class="logo">SAGE Briefing</h1>
                    <div class="meta-info">
                        <span id="date" class="date">&nbsp;</span>
                        <span class="dot">•</span>
                        <span id="signal_count" class="signals">0 signals processed</span>
                    </div>
                </div>
                <div style="display:flex;gap:0.5rem;align-items:center">
                    <button class="run-btn minimal" onclick="openSettings()" title="Edit Profile">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                    </button>
                    <button class="run-btn minimal" onclick="runPipeline()" id="run-btn">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M21 2v6h-6"></path>
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        </svg>
                        Refresh
                    </button>
                </div>
            </header>

            <!-- Settings Modal -->
            <div id="settings-modal" class="modal-overlay hidden" onclick="closeSettings(event)">
                <div class="modal-box">
                    <div class="modal-header">
                        <h2>Edit Profile</h2>
                        <button onclick="closeSettings()" class="modal-close">✕</button>
                    </div>

                    <div class="modal-body">
                        <label>Name</label>
                        <input id="p-name" type="text" />

                        <label>Role</label>
                        <input id="p-role" type="text" />

                        <label>Tone (how SAGE speaks to you)</label>
                        <textarea id="p-tone" rows="2"></textarea>

                        <label>Goals (one per line)</label>
                        <textarea id="p-goals" rows="3"
                            placeholder="Ace the upcoming exams&#10;Secure a top internship"></textarea>

                        <label>Exams (format: Subject Name | CODE | YYYY-MM-DD)</label>
                        <textarea id="p-exams" rows="6"
                            placeholder="Microprocessor and Interfacing | CS-221 | 2026-04-27"></textarea>
                    </div>

                    <div class="modal-footer">
                        <button class="run-btn primary" onclick="saveProfile()">Save Changes</button>
                        <span id="profile-status" class="meta-status"></span>
                    </div>
                </div>
            </div>

            <!-- System Status Bar -->
            <div id="status-bar" class="status-bar hidden">
                <span class="status-label">Last run:</span>
                <span id="status-time"></span>
                <span id="status-modules"></span>
            </div>

            <main>
                <div id="hook" class="hook fade-in"></div>

                <!-- Exam Countdown -->
                <div id="exam-countdown" class="exam-countdown fade-in hidden" style="animation-delay:0.05s"></div>

                <div class="grid-layout">
                    <!-- Left Column -->
                    <div class="left-col">
                        <section class="card fade-in" style="animation-delay: 0.1s">
                            <h2>Situation Report</h2>
                            <p id="situation"></p>
                        </section>

                        <section class="card financial fade-in" style="animation-delay: 0.2s">
                            <h2>Financial Pulse</h2>
                            <p id="financial"></p>
                        </section>
                    </div>

                    <!-- Right Column -->
                    <div class="right-col">
                        <section class="card fade-in" style="animation-delay: 0.15s">
                            <h2>Action Items</h2>
                            <ul id="actions" class="actions-list"></ul>
                        </section>

                        <section class="card fade-in" style="animation-delay: 0.2s">
                            <h2>My Tasks</h2>
                            <form class="task-form" onsubmit="addTask(event)">
                                <input id="task-title" type="text" placeholder="Add a task..." required />
                                <input id="task-due" type="date" />
                                <select id="task-priority">
                                    <option value="high">High</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="low">Low</option>
                                </select>
                                <input id="task-subject" type="text" placeholder="Subject (optional)" />
                                <button type="submit">Add</button>
                            </form>
                            <ul id="tasks-list" class="tasks-list"></ul>
                        </section>
                    </div>
                </div>

                <footer class="footer fade-in" style="animation-delay: 0.3s">
                    <p id="close" class="closing-thought"></p>

                    <div class="audio-player hidden" id="audio-section">
                        <audio id="briefing-audio" src="/api/briefing/audio" preload="none"></audio>
                        <button class="audio-btn" id="audio-btn" onclick="toggleAudio()">
                            <svg id="play-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                                <polygon points="5,3 19,12 5,21" />
                            </svg>
                            <svg id="pause-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"
                                class="hidden">
                                <rect x="6" y="4" width="4" height="16" />
                                <rect x="14" y="4" width="4" height="16" />
                            </svg>
                            <span id="audio-label">Listen to Briefing</span>
                        </button>
                    </div>

                    <div id="status" class="meta-status"></div>
                </footer>

                <!-- Raw Signals collapsible -->
                <section class="signals-section fade-in" style="animation-delay:0.4s">
                    <button class="signals-toggle" onclick="toggleSignals()">
                        <span>Raw Signals</span>
                        <span id="signals-count" class="signals-badge">0</span>
                        <svg id="signals-chevron" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor"
                            stroke-width="2" fill="none">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </button>
                    <div id="signals-list" class="signals-list hidden"></div>
                </section>

                <!-- Briefing History -->
                <section class="signals-section fade-in" style="animation-delay:0.5s">
                    <button class="signals-toggle" onclick="toggleHistory()">
                        <span>Briefing History</span>
                        <span class="signals-badge">7d</span>
                        <svg id="history-chevron" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor"
                            stroke-width="2" fill="none">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </button>
                    <div id="history-list" class="signals-list hidden"></div>
                </section>
            </main>
        </div>

    </div>
    <script src="/static/app.js"></script>
</body>

</html>
